name: Release

# Build and publish a VSIX as a GitHub Release.
#  - Push to main: every commit releases a new, auto-incremented version
#    (v<major>.<minor>.<run_number>), where major.minor come from package.json.
#  - Push a vX.Y.Z tag: releases that exact tag/version.
#  - Run manually (workflow_dispatch): same auto-increment as a main push.
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies (clean, from lockfile)
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Determine version
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Tag push: use the tag verbatim.
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            # main push / manual: keep major.minor from package.json, use the
            # workflow run number as a unique, increasing patch.
            BASE="$(node -p "require('./package.json').version")"
            MAJOR_MINOR="$(echo "${BASE}" | cut -d. -f1,2)"
            VERSION="${MAJOR_MINOR}.${GITHUB_RUN_NUMBER}"
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION} (tag ${TAG})"

      - name: Stamp version into package.json
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        id: package
        run: |
          npx --yes @vscode/vsce@latest package
          VSIX_PATH="$(ls -1 *.vsix | head -n 1)"
          echo "vsix_path=${VSIX_PATH}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${VSIX_PATH}"

      - name: Create GitHub Release and upload VSIX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            "${{ steps.package.outputs.vsix_path }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --generate-notes
